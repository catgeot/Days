# gateo.kr Playwright E2E — 수동 + 일 1회 (MOONi AI 비용)
# @see plans/site-health-monitoring-plan.md Phase 2-C

name: E2E Health

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-health
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E against production
        env:
          SMOKE_SITE_URL: https://gateo.kr
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
