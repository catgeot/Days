# gateo.kr API·사이트 헬스 스모크 — 6시간마다 + 수동 실행
# @see plans/site-health-monitoring-plan.md Phase 1-C
#
# 필수 Repository secrets (Settings → Secrets and variables → Actions → Repository secrets):
#   VITE_SUPABASE_URL      — https://phdjnbfitvmrguqzverm.supabase.co
#   VITE_SUPABASE_ANON_KEY — Vercel production과 동일, = 뒤·줄바꿈·공백 없음
# ⚠️ Environment secrets / Variables 탭이 아닌 **Repository secrets** 에 등록

name: Smoke Health

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: smoke-health
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate repository secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_SUPABASE_URL// /}" ] || [ -z "${VITE_SUPABASE_ANON_KEY// /}" ]; then
            echo "::error title=Secrets missing::Repository secrets VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY 가 비어 있습니다. Settings → Secrets and variables → Actions → Repository secrets 에 등록하세요 (Variables 탭 아님)."
            exit 1
          fi
          KEY_LEN=${#VITE_SUPABASE_ANON_KEY}
          URL_LEN=${#VITE_SUPABASE_URL}
          echo "Secrets OK — URL length=${URL_LEN}, anon key length=${KEY_LEN} (values hidden)"
          if [ "$KEY_LEN" -lt 100 ]; then
            echo "::error title=Invalid anon key::VITE_SUPABASE_ANON_KEY 길이가 너무 짧습니다 (${KEY_LEN}). JWT 전체를 다시 붙여넣으세요."
            exit 1
          fi
          case "$VITE_SUPABASE_ANON_KEY" in
            eyJ*) ;;
            *) echo "::error title=Invalid anon key::VITE_SUPABASE_ANON_KEY는 eyJ 로 시작하는 JWT여야 합니다."; exit 1 ;;
          esac

      - name: Run smoke health probes
        env:
          GITHUB_ACTIONS: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SMOKE_SITE_URL: https://gateo.kr
          SMOKE_GEMINI_PROBE: '1'
          SMOKE_FAIL_ON_WARN: '1'
        run: node scripts/smoke-health.mjs
